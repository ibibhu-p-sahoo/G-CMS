<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GITAM College Management System</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- ============ LOGIN SCREEN ============ -->
  <div id="loginScreen" class="login-wrap">
    <div class="login-split">
      <!-- left: campus hero -->
      <div class="login-hero">
        <img src="assets/campus-building.webp" alt="GITAM Campus Building" class="login-hero-img" />
        <div class="login-hero-overlay">
          <img src="assets/gitam-logo.png" alt="GITAM" class="hero-logo" />
          <h2>Gandhi Institute of Technology &amp; Management</h2>
          <p>Bhubaneswar · College Management System</p>
        </div>
      </div>

      <!-- right: login form -->
      <div class="login-card">
      <div class="login-brand">
        <img src="assets/gitam-logo.png" alt="GITAM" class="brand-logo" />
        <div>
          <h1>GITAM</h1>
          <p>College Management System</p>
        </div>
      </div>

      <form id="loginForm" autocomplete="off">
        <label>Username</label>
        <input type="text" id="loginUser" placeholder="e.g. admin" required />

        <label>Password</label>
        <input type="password" id="loginPass" placeholder="Enter password" required />

        <label>Login as</label>
        <select id="loginRole">
          <option value="admin">Admin</option>
          <option value="faculty">Faculty</option>
          <option value="student">Student</option>
        </select>

        <button type="submit" class="btn-primary btn-block">Sign In</button>
        <p id="loginError" class="login-error"></p>
      </form>

      <div class="login-hint">
        <strong>Demo logins:</strong>
        <span>admin / admin123</span>
        <span>faculty: rmehta / pass123</span>
        <span>student: 21CS001 / pass123</span>
      </div>
      </div><!-- /login-card -->
    </div><!-- /login-split -->
    <div class="login-footer">© <span id="year"></span> GITAM · Bhubaneswar · Demo project</div>
  </div>

  <!-- ============ MAIN APP ============ -->
  <div id="appScreen" class="app-wrap hidden">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <img src="assets/gitam-logo.png" alt="GITAM" class="side-logo" />
        <div>
          <strong>GITAM</strong>
          <small>CMS · Bhubaneswar</small>
        </div>
      </div>
      <nav id="navMenu" class="nav-menu"></nav>
      <div class="sidebar-footer">
        <div id="sideUser" class="side-user"></div>
        <button id="logoutBtn" class="btn-ghost btn-block"><span class="lo-ico">⎋</span><span class="lo-txt">Logout</span></button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="content">
      <header class="topbar">
        <button id="menuToggle" class="menu-toggle">☰</button>
        <h2 id="pageTitle">Dashboard</h2>
        <div class="topbar-right">
          <span id="topUserName"></span>
          <span id="topUserRole" class="role-badge"></span>
        </div>
      </header>
      <div id="view" class="view"></div>
    </main>
  </div>

  <!-- Modal -->
  <div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-head">
        <h3 id="modalTitle">Title</h3>
        <button id="modalClose" class="modal-close">&times;</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
